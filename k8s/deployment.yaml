apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
      annotations:
        # Fallback scrape annotations in case you're not using the
        # Prometheus Operator's ServiceMonitor CRD.
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: demo-app
          # Replace with your own image registry/repo after building & pushing
          image: <YOUR_REGISTRY>/k8s-observability-demo-app:latest
          ports:
            - containerPort: 5000
          env:
            - name: ERROR_RATE
              value: "0.05"
            - name: MAX_LATENCY_MS
              value: "400"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
