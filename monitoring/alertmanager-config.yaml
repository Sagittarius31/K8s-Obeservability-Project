# Alertmanager config that routes alerts to Slack based on severity.
#
# Two ways to apply this:
#  1. (Simplest) Paste the contents of `config:` below into the `alertmanager:`
#     block of monitoring/prometheus-values.yaml before installing the chart.
#  2. Apply as its own Secret and reference it - cleaner if you want to keep
#     the webhook URL out of values.yaml / git history (recommended):
#       kubectl create secret generic alertmanager-slack \
#         --namespace monitoring \
#         --from-literal=slack_api_url='https://hooks.slack.com/services/XXX/YYY/ZZZ'
#     then reference slack_api_url_file in the config below, or use a
#     secretKeyRef if your Alertmanager version supports it.
#
# Get a Slack webhook URL: Slack -> Apps -> Incoming Webhooks -> Add to Slack

alertmanager:
  config:
    global:
      resolve_timeout: 5m
      slack_api_url: "https://hooks.slack.com/services/REPLACE/WITH/YOUR_WEBHOOK"

    route:
      receiver: "slack-default"
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers:
            - severity = "critical"
          receiver: "slack-critical"
          continue: false
        - matchers:
            - severity = "warning"
          receiver: "slack-warnings"
          continue: false

    receivers:
      - name: "slack-default"
        slack_configs:
          - channel: "#alerts"
            send_resolved: true
            title: "{{ .CommonAnnotations.summary }}"
            text: "{{ .CommonAnnotations.description }}"

      - name: "slack-critical"
        slack_configs:
          - channel: "#alerts-critical"
            send_resolved: true
            title: ":rotating_light: {{ .CommonAnnotations.summary }}"
            text: "{{ .CommonAnnotations.description }}"

      - name: "slack-warnings"
        slack_configs:
          - channel: "#alerts-warnings"
            send_resolved: true
            title: ":warning: {{ .CommonAnnotations.summary }}"
            text: "{{ .CommonAnnotations.description }}"
